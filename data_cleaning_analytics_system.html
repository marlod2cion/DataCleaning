<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataCraft - Data Cleaning & Analytics System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222538;
    --border: #2e3148;
    --accent: #6366f1;
    --accent2: #22d3ee;
    --accent3: #f59e0b;
    --text: #e2e8f0;
    --muted: #8892a4;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --radius: 10px;
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  
  #app { display: flex; flex-direction: column; min-height: 100vh; }
  
  header {
    background: linear-gradient(135deg, #1a1d27 0%, #222538 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
  header h1 { font-size: 20px; font-weight: 700; background: linear-gradient(to right, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header p { font-size: 12px; color: var(--muted); }

  .steps { display: flex; align-items: center; gap: 0; padding: 0 24px; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .step { display: flex; align-items: center; gap: 8px; padding: 14px 16px; font-size: 13px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.2s; }
  .step:hover { color: var(--text); }
  .step.active { color: var(--accent); border-bottom-color: var(--accent); }
  .step.done { color: var(--success); }
  .step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
  .step.active .step-num { background: var(--accent); border-color: var(--accent); color: white; }
  .step.done .step-num { background: var(--success); border-color: var(--success); color: white; }
  .arrow { color: var(--border); font-size: 12px; padding: 0 4px; }

  .main { flex: 1; padding: 24px; max-width: 1400px; margin: 0 auto; width: 100%; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
  .panel-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .panel-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

  .upload-zone {
    border: 2px dashed var(--border); border-radius: var(--radius); padding: 60px 40px; text-align: center;
    cursor: pointer; transition: all 0.3s; background: var(--surface2);
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(99,102,241,0.05); }
  .upload-icon { font-size: 48px; margin-bottom: 16px; }
  .upload-zone h3 { font-size: 18px; margin-bottom: 8px; }
  .upload-zone p { color: var(--muted); font-size: 14px; }
  .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #5254cc; }
  .btn-success { background: var(--success); color: white; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: var(--surface2); }
  .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
  .btn-sm { padding: 6px 14px; font-size: 12px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

  .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-val { font-size: 28px; font-weight: 700; }
  .stat-val.accent { color: var(--accent); }
  .stat-val.success { color: var(--success); }
  .stat-val.danger { color: var(--danger); }
  .stat-val.warning { color: var(--warning); }

  .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--surface2); padding: 10px 14px; text-align: left; font-weight: 600; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 9px 14px; border-bottom: 1px solid rgba(46,49,72,0.5); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(99,102,241,0.04); }
  .null-cell { color: var(--danger); font-style: italic; font-size: 11px; background: rgba(239,68,68,0.08); border-radius: 4px; padding: 2px 6px; }
  .changed-cell { background: rgba(34,211,238,0.08); color: var(--accent2); }
  
  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-blue { background: rgba(99,102,241,0.15); color: var(--accent); }
  .badge-green { background: rgba(16,185,129,0.15); color: var(--success); }
  .badge-red { background: rgba(239,68,68,0.15); color: var(--danger); }
  .badge-yellow { background: rgba(245,158,11,0.15); color: var(--warning); }
  .badge-cyan { background: rgba(34,211,238,0.15); color: var(--accent2); }

  .clean-option { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .clean-option label { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .clean-option input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); }
  .clean-option h4 { font-size: 14px; font-weight: 500; }
  .clean-option p { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface2); border-radius: 8px; padding: 4px; }
  .tab { padding: 8px 16px; border-radius: 6px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
  .tab.active { background: var(--accent); color: white; }

  .chart-container { position: relative; height: 280px; }

  select, input[type=text] { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 13px; }
  select:focus, input:focus { outline: none; border-color: var(--accent); }

  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-top: 6px; }
  .progress-fill { height: 100%; background: linear-gradient(to right, var(--accent), var(--accent2)); border-radius: 3px; transition: width 0.5s; }

  .col-profile { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .col-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .col-card h4 { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .col-card .detail { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; border-bottom: 1px solid rgba(46,49,72,0.4); }
  .col-card .detail:last-child { border-bottom: none; }
  .col-card .detail span:first-child { color: var(--muted); }

  .insight-card { background: var(--surface2); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 14px 16px; margin-bottom: 10px; }
  .insight-card h4 { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .insight-card p { font-size: 13px; color: var(--muted); }

  .compare-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .compare-box { border-radius: 8px; overflow: hidden; }
  .compare-box h4 { padding: 10px 16px; font-size: 13px; font-weight: 600; }
  .compare-box.original h4 { background: rgba(239,68,68,0.1); color: var(--danger); border-bottom: 1px solid rgba(239,68,68,0.2); }
  .compare-box.cleaned h4 { background: rgba(16,185,129,0.1); color: var(--success); border-bottom: 1px solid rgba(16,185,129,0.2); }

  .toast { position: fixed; top: 20px; right: 20px; background: var(--success); color: white; padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 999; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .steps-flow { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .steps-flow span { color: var(--text); }

  .empty-state { text-align: center; padding: 60px; color: var(--muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

  @media (max-width: 700px) {
    .grid-2, .grid-3, .grid-4, .compare-row, .col-profile { grid-template-columns: 1fr; }
    .main { padding: 16px; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">DC</div>
    <div>
      <h1>DataCraft Analytics</h1>
      <p>BAT403 — Data Cleaning & Analytics System</p>
    </div>
  </header>

  <div class="steps" id="stepsBar"></div>
  <div class="main" id="mainContent"></div>
</div>

<script>
let state = {
  step: 0,
  rawData: [],
  cleanedData: [],
  headers: [],
  fileName: '',
  cleanOptions: { missingValues: true, duplicates: true, trimSpaces: true, standardizeCase: false, filterInvalid: false },
  cleanLog: [],
  chartType: 'bar',
  xAxis: '',
  yAxis: '',
  activeTab: 'bar',
  vizTab: 'bar'
};

const STEPS = [
  { label: 'Upload', icon: '↑' },
  { label: 'Profile', icon: '≡' },
  { label: 'Clean', icon: '✦' },
  { label: 'Compare', icon: '⇄' },
  { label: 'Insights', icon: '◈' },
  { label: 'Dashboard', icon: '▣' },
];

function renderSteps() {
  const bar = document.getElementById('stepsBar');
  bar.innerHTML = STEPS.map((s, i) => {
    const cls = i < state.step ? 'done' : i === state.step ? 'active' : '';
    const arrow = i < STEPS.length - 1 ? '<span class="arrow">›</span>' : '';
    return `<div class="step ${cls}" onclick="goToStep(${i})">
      <span class="step-num">${i < state.step ? '✓' : i + 1}</span> ${s.label}
    </div>${arrow}`;
  }).join('');
}

function goToStep(n) {
  if (n > 0 && state.rawData.length === 0) return;
  if (n > 2 && state.cleanedData.length === 0) return;
  state.step = n;
  renderAll();
}

function renderAll() {
  renderSteps();
  const main = document.getElementById('mainContent');
  if (state.step === 0) main.innerHTML = renderUpload();
  else if (state.step === 1) main.innerHTML = renderProfile();
  else if (state.step === 2) main.innerHTML = renderClean();
  else if (state.step === 3) main.innerHTML = renderCompare();
  else if (state.step === 4) main.innerHTML = renderInsights();
  else if (state.step === 5) { main.innerHTML = renderDashboard(); setTimeout(drawCharts, 100); }
  attachEvents();
}

function renderUpload() {
  return `
  <div class="panel">
    <div class="panel-title">Upload Dataset</div>
    <div class="panel-sub">Upload a CSV or Excel-style CSV file to begin your data analysis workflow.</div>
    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📂</div>
      <h3>Drop your file here or click to browse</h3>
      <p>Supports CSV files • Max 10MB</p>
      <input type="file" id="fileInput" accept=".csv" style="display:none">
    </div>
    <div style="margin-top:20px;text-align:center">
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px">Or try with sample data:</p>
      <button class="btn btn-outline btn-sm" onclick="loadSample()">Load Sample Sales Dataset</button>
    </div>
  </div>`;
}

function renderProfile() {
  const rows = state.rawData.length;
  const cols = state.headers.length;
  let missingCount = 0;
  let dupCount = 0;
  const seen = new Set();
  state.rawData.forEach(row => {
    const key = JSON.stringify(row);
    if (seen.has(key)) dupCount++;
    else seen.add(key);
    state.headers.forEach(h => { if (!row[h] || row[h].toString().trim() === '') missingCount++; });
  });
  const totalCells = rows * cols;
  const completeness = Math.round(((totalCells - missingCount) / totalCells) * 100);

  const colCards = state.headers.slice(0, 8).map(h => {
    const vals = state.rawData.map(r => r[h]).filter(v => v && v.toString().trim() !== '');
    const missing = state.rawData.length - vals.length;
    const nums = vals.map(v => parseFloat(v)).filter(v => !isNaN(v));
    const isNum = nums.length > vals.length * 0.7;
    let extra = '';
    if (isNum && nums.length > 0) {
      const mn = Math.min(...nums).toFixed(1);
      const mx = Math.max(...nums).toFixed(1);
      const avg = (nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1);
      extra = `<div class="detail"><span>Min</span><span>${mn}</span></div>
               <div class="detail"><span>Max</span><span>${mx}</span></div>
               <div class="detail"><span>Mean</span><span>${avg}</span></div>`;
    }
    const unique = [...new Set(vals)].length;
    return `<div class="col-card">
      <h4>${h} <span class="badge ${isNum ? 'badge-blue' : 'badge-cyan'}">${isNum ? 'Number' : 'Text'}</span></h4>
      <div class="detail"><span>Non-null</span><span>${vals.length}</span></div>
      <div class="detail"><span>Missing</span><span style="color:${missing > 0 ? 'var(--danger)' : 'var(--success)'}">${missing}</span></div>
      <div class="detail"><span>Unique</span><span>${unique}</span></div>
      ${extra}
    </div>`;
  }).join('');

  const previewRows = state.rawData.slice(0, 8);
  const tableHTML = `<div class="table-wrap"><table>
    <thead><tr>${state.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${previewRows.map(row => `<tr>${state.headers.map(h => {
      const v = row[h];
      return !v || v.toString().trim() === '' ? `<td><span class="null-cell">NULL</span></td>` : `<td>${v}</td>`;
    }).join('')}</tr>`).join('')}</tbody>
  </table></div>`;

  return `
  <div class="grid-4" style="margin-bottom:20px">
    <div class="stat-card"><div class="stat-label">Total Rows</div><div class="stat-val accent">${rows.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">Columns</div><div class="stat-val accent">${cols}</div></div>
    <div class="stat-card"><div class="stat-label">Missing Values</div><div class="stat-val ${missingCount > 0 ? 'danger' : 'success'}">${missingCount}</div></div>
    <div class="stat-card"><div class="stat-label">Completeness</div><div class="stat-val ${completeness >= 90 ? 'success' : 'warning'}">${completeness}%</div></div>
  </div>
  <div class="panel">
    <div class="panel-title">Data Preview</div>
    <div class="panel-sub">First 8 rows of <strong>${state.fileName}</strong> • ${rows} total rows</div>
    ${tableHTML}
  </div>
  <div class="panel">
    <div class="panel-title">Column Profiles</div>
    <div class="panel-sub">Detected data types, missing values, and basic statistics per column</div>
    <div class="col-profile">${colCards}</div>
  </div>
  ${dupCount > 0 ? `<div class="panel" style="border-color:rgba(245,158,11,0.3)">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:20px">⚠️</span>
      <div><strong>${dupCount} duplicate row(s) detected</strong><br><span style="color:var(--muted);font-size:13px">These will be removed during the cleaning step.</span></div>
    </div>
  </div>` : ''}
  <div style="display:flex;gap:12px;justify-content:flex-end">
    <button class="btn btn-primary" onclick="goToStep(2)">Proceed to Cleaning →</button>
  </div>`;
}

function renderClean() {
  return `
  <div class="panel">
    <div class="panel-title">Data Cleaning Options</div>
    <div class="panel-sub">Select the cleaning operations to apply to your dataset</div>
    <div class="grid-2" style="margin-bottom:20px">
      <div class="clean-option">
        <label><input type="checkbox" id="opt_missing" ${state.cleanOptions.missingValues ? 'checked' : ''} onchange="updateOpt('missingValues', this.checked)">
          <div><h4>Handle Missing Values</h4><p>Replace empty cells with column mean (numbers) or "Unknown" (text)</p></div>
        </label>
      </div>
      <div class="clean-option">
        <label><input type="checkbox" id="opt_dup" ${state.cleanOptions.duplicates ? 'checked' : ''} onchange="updateOpt('duplicates', this.checked)">
          <div><h4>Remove Duplicates</h4><p>Drop exact duplicate rows keeping the first occurrence</p></div>
        </label>
      </div>
      <div class="clean-option">
        <label><input type="checkbox" id="opt_trim" ${state.cleanOptions.trimSpaces ? 'checked' : ''} onchange="updateOpt('trimSpaces', this.checked)">
          <div><h4>Trim Whitespace</h4><p>Remove leading/trailing spaces from all text fields</p></div>
        </label>
      </div>
      <div class="clean-option">
        <label><input type="checkbox" id="opt_case" ${state.cleanOptions.standardizeCase ? 'checked' : ''} onchange="updateOpt('standardizeCase', this.checked)">
          <div><h4>Standardize Text Case</h4><p>Convert all text columns to Title Case for consistency</p></div>
        </label>
      </div>
      <div class="clean-option">
        <label><input type="checkbox" id="opt_inv" ${state.cleanOptions.filterInvalid ? 'checked' : ''} onchange="updateOpt('filterInvalid', this.checked)">
          <div><h4>Filter Invalid Numbers</h4><p>Remove rows where numeric columns contain non-numeric values</p></div>
        </label>
      </div>
    </div>
    <button class="btn btn-success" onclick="runCleaning()">▶ Run Cleaning Operations</button>
  </div>
  ${state.cleanedData.length > 0 ? `
  <div class="panel" style="border-color:rgba(16,185,129,0.3)">
    <div class="panel-title" style="color:var(--success)">✓ Cleaning Complete</div>
    <div style="margin:12px 0">
      ${state.cleanLog.map(l => `<div style="font-size:13px;padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px"><span style="color:var(--success)">✓</span> ${l}</div>`).join('')}
    </div>
    <div style="display:flex;gap:12px;margin-top:16px">
      <button class="btn btn-primary" onclick="goToStep(3)">View Comparison →</button>
      <button class="btn btn-outline" onclick="downloadClean()">⬇ Download Cleaned CSV</button>
    </div>
  </div>` : ''}`;
}

function renderCompare() {
  const previewOrig = state.rawData.slice(0, 6);
  const previewClean = state.cleanedData.slice(0, 6);
  const origMissing = countMissing(state.rawData);
  const cleanMissing = countMissing(state.cleanedData);
  const origDups = countDups(state.rawData);
  const cleanDups = countDups(state.cleanedData);

  function makeTable(rows, highlight) {
    return `<div class="table-wrap"><table>
      <thead><tr>${state.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(row => `<tr>${state.headers.map(h => {
        const v = row[h];
        if (!v || v.toString().trim() === '') return `<td><span class="null-cell">NULL</span></td>`;
        if (highlight) return `<td class="changed-cell">${v}</td>`;
        return `<td>${v}</td>`;
      }).join('')}</tr>`).join('')}
      </tbody></table></div>`;
  }

  return `
  <div class="grid-4" style="margin-bottom:20px">
    <div class="stat-card"><div class="stat-label">Original Rows</div><div class="stat-val accent">${state.rawData.length}</div></div>
    <div class="stat-card"><div class="stat-label">Cleaned Rows</div><div class="stat-val success">${state.cleanedData.length}</div></div>
    <div class="stat-card"><div class="stat-label">Rows Removed</div><div class="stat-val warning">${state.rawData.length - state.cleanedData.length}</div></div>
    <div class="stat-card"><div class="stat-label">Missing Fixed</div><div class="stat-val success">${origMissing - cleanMissing}</div></div>
  </div>
  <div class="compare-row">
    <div class="compare-box original panel" style="padding:0;overflow:hidden">
      <h4 style="padding:12px 16px;background:rgba(239,68,68,0.08);color:var(--danger)">📋 Original Dataset (${state.rawData.length} rows)</h4>
      <div style="padding:12px">${makeTable(previewOrig, false)}</div>
    </div>
    <div class="compare-box cleaned panel" style="padding:0;overflow:hidden">
      <h4 style="padding:12px 16px;background:rgba(16,185,129,0.08);color:var(--success)">✦ Cleaned Dataset (${state.cleanedData.length} rows)</h4>
      <div style="padding:12px">${makeTable(previewClean, true)}</div>
    </div>
  </div>
  <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:16px">
    <button class="btn btn-primary" onclick="goToStep(4)">View Insights →</button>
  </div>`;
}

function renderInsights() {
  const data = state.cleanedData;
  const numCols = state.headers.filter(h => data.map(r => parseFloat(r[h])).filter(v => !isNaN(v)).length > data.length * 0.5);
  const textCols = state.headers.filter(h => !numCols.includes(h));

  const insights = [];

  numCols.forEach(h => {
    const vals = data.map(r => parseFloat(r[h])).filter(v => !isNaN(v));
    if (vals.length === 0) return;
    const avg = (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2);
    const max = Math.max(...vals);
    const min = Math.min(...vals);
    insights.push({ title: `${h}: Average is ${avg}`, text: `Range: ${min} — ${max}. This column has ${vals.length} valid numeric entries.` });
  });

  textCols.slice(0, 3).forEach(h => {
    const freq = {};
    data.forEach(r => { const v = r[h]; if (v) freq[v] = (freq[v] || 0) + 1; });
    const top = Object.entries(freq).sort((a,b) => b[1]-a[1]).slice(0, 3);
    if (top.length) insights.push({ title: `Most frequent ${h}: "${top[0][0]}"`, text: `Top 3: ${top.map(([v,c]) => `${v} (${c}×)`).join(', ')}` });
  });

  insights.push({ title: `Dataset has ${data.length} clean records across ${state.headers.length} attributes`, text: `Cleaning improved data quality — ready for visualization and reporting.` });

  const sumRows = numCols.slice(0, 4).map(h => {
    const vals = data.map(r => parseFloat(r[h])).filter(v => !isNaN(v));
    if (!vals.length) return '';
    const avg = (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2);
    const std = Math.sqrt(vals.reduce((a,b)=>a+(b-avg)*(b-avg),0)/vals.length).toFixed(2);
    return `<tr><td>${h}</td><td>${vals.length}</td><td>${Math.min(...vals).toFixed(2)}</td><td>${Math.max(...vals).toFixed(2)}</td><td>${avg}</td><td>${std}</td></tr>`;
  }).join('');

  return `
  <div class="panel">
    <div class="panel-title">Key Insights</div>
    <div class="panel-sub">Auto-generated patterns and observations from your cleaned dataset</div>
    ${insights.map(i => `<div class="insight-card"><h4>${i.title}</h4><p>${i.text}</p></div>`).join('')}
  </div>
  ${sumRows ? `<div class="panel">
    <div class="panel-title">Summary Statistics</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Column</th><th>Count</th><th>Min</th><th>Max</th><th>Mean</th><th>Std Dev</th></tr></thead>
      <tbody>${sumRows}</tbody>
    </table></div>
  </div>` : ''}
  <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:4px">
    <button class="btn btn-primary" onclick="goToStep(5)">Open Dashboard →</button>
  </div>`;
}

function renderDashboard() {
  const numCols = state.headers.filter(h => state.cleanedData.map(r => parseFloat(r[h])).filter(v => !isNaN(v)).length > state.cleanedData.length * 0.4);
  const allCols = state.headers;
  if (!state.xAxis) state.xAxis = allCols[0] || '';
  if (!state.yAxis) state.yAxis = numCols[0] || allCols[1] || '';

  return `
  <div class="panel">
    <div class="panel-title">Interactive Dashboard</div>
    <div class="panel-sub">Select chart type and axes to visualize your data</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:20px">
      <div>
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">Chart Type</label>
        <select id="chartTypeSelect" onchange="state.vizTab=this.value;renderAll()">
          <option value="bar" ${state.vizTab==='bar'?'selected':''}>Bar Chart</option>
          <option value="line" ${state.vizTab==='line'?'selected':''}>Line Chart</option>
          <option value="pie" ${state.vizTab==='pie'?'selected':''}>Pie Chart</option>
        </select>
      </div>
      <div>
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">X Axis / Category</label>
        <select id="xAxisSelect" onchange="state.xAxis=this.value;renderAll()">
          ${allCols.map(c => `<option value="${c}" ${state.xAxis===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      ${state.vizTab !== 'pie' ? `<div>
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:4px">Y Axis / Value</label>
        <select id="yAxisSelect" onchange="state.yAxis=this.value;renderAll()">
          ${allCols.map(c => `<option value="${c}" ${state.yAxis===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>` : ''}
    </div>
    <div class="chart-container"><canvas id="mainChart"></canvas></div>
  </div>
  <div class="grid-2">
    <div class="panel">
      <div class="panel-title" style="font-size:14px">Top 5 by ${state.xAxis}</div>
      <div class="chart-container" style="height:200px"><canvas id="topChart"></canvas></div>
    </div>
    <div class="panel">
      <div class="panel-title" style="font-size:14px">Distribution</div>
      <div class="chart-container" style="height:200px"><canvas id="distChart"></canvas></div>
    </div>
  </div>`;
}

function drawCharts() {
  const data = state.cleanedData;
  const xCol = state.xAxis;
  const yCol = state.yAxis;

  const palette = ['#6366f1','#22d3ee','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6'];

  function groupBy(col, valCol) {
    const g = {};
    data.forEach(r => {
      const k = r[col] || 'Unknown';
      const v = parseFloat(r[valCol]);
      if (!g[k]) g[k] = [];
      if (!isNaN(v)) g[k].push(v);
      else if (!valCol) g[k].push(1);
    });
    return g;
  }

  const labels = [...new Set(data.map(r => r[xCol] || 'Unknown'))].slice(0, 12);

  const g = groupBy(xCol, yCol);
  const yVals = labels.map(l => {
    const arr = g[l] || [];
    return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
  });

  const chartDefaults = { borderRadius: 6, borderWidth: 0 };
  const gridColor = 'rgba(255,255,255,0.06)';
  const textColor = '#8892a4';

  function destroyChart(id) {
    const existing = Chart.getChart(id);
    if (existing) existing.destroy();
  }

  destroyChart('mainChart');
  const mainCtx = document.getElementById('mainChart').getContext('2d');
  if (state.vizTab === 'pie') {
    new Chart(mainCtx, { type: 'doughnut', data: {
      labels, datasets: [{ data: labels.map(l => (g[l]||[]).length), backgroundColor: palette, borderWidth: 2, borderColor: '#1a1d27' }]
    }, options: { plugins: { legend: { labels: { color: textColor, boxWidth: 14 } } }, cutout: '60%' }});
  } else {
    new Chart(mainCtx, { type: state.vizTab, data: {
      labels, datasets: [{ label: yCol, data: yVals, backgroundColor: state.vizTab==='line' ? 'rgba(99,102,241,0.15)' : palette, borderColor: '#6366f1', borderWidth: state.vizTab==='line' ? 2 : 0, fill: state.vizTab==='line', tension: 0.4, ...chartDefaults }]
    }, options: {
      scales: { x: { ticks: { color: textColor, font: {size:11} }, grid: { color: gridColor } }, y: { ticks: { color: textColor }, grid: { color: gridColor } } },
      plugins: { legend: { labels: { color: textColor } } }
    }});
  }

  destroyChart('topChart');
  const top5 = labels.slice(0,5);
  const top5v = yVals.slice(0,5);
  new Chart(document.getElementById('topChart').getContext('2d'), { type: 'bar', data: {
    labels: top5, datasets: [{ data: top5v, backgroundColor: palette.slice(0,5), ...chartDefaults }]
  }, options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { color: textColor, font:{size:10} }, grid:{color:gridColor} }, y: { ticks:{color:textColor}, grid:{color:gridColor} } } }});

  destroyChart('distChart');
  const freq = {};
  data.forEach(r => { const v = r[xCol]; if(v) freq[v] = (freq[v]||0)+1; });
  const fLabels = Object.keys(freq).slice(0,8);
  const fVals = fLabels.map(k => freq[k]);
  new Chart(document.getElementById('distChart').getContext('2d'), { type: 'pie', data: {
    labels: fLabels, datasets: [{ data: fVals, backgroundColor: palette, borderWidth: 2, borderColor: '#1a1d27' }]
  }, options: { plugins: { legend: { display: false } } }});
}

function countMissing(data) {
  let c = 0;
  data.forEach(r => state.headers.forEach(h => { if (!r[h] || r[h].toString().trim() === '') c++; }));
  return c;
}

function countDups(data) {
  const seen = new Set(); let c = 0;
  data.forEach(r => { const k = JSON.stringify(r); if(seen.has(k)) c++; else seen.add(k); });
  return c;
}

function updateOpt(key, val) { state.cleanOptions[key] = val; }

function runCleaning() {
  let data = state.rawData.map(r => ({...r}));
  const log = [];
  const opts = state.cleanOptions;
  const numCols = state.headers.filter(h => data.map(r => parseFloat(r[h])).filter(v => !isNaN(v)).length > data.length * 0.5);

  if (opts.trimSpaces) {
    data = data.map(r => { const n = {}; state.headers.forEach(h => { n[h] = r[h] ? r[h].toString().trim() : r[h]; }); return n; });
    log.push('Trimmed whitespace from all text fields');
  }

  if (opts.missingValues) {
    numCols.forEach(h => {
      const vals = data.map(r => parseFloat(r[h])).filter(v => !isNaN(v));
      const avg = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
      let filled = 0;
      data = data.map(r => { if (!r[h] || r[h].toString().trim() === '') { filled++; return {...r, [h]: avg.toFixed(2)}; } return r; });
      if (filled > 0) log.push(`Filled ${filled} missing values in "${h}" with mean (${avg.toFixed(2)})`);
    });
    const textCols = state.headers.filter(h => !numCols.includes(h));
    textCols.forEach(h => {
      let filled = 0;
      data = data.map(r => { if (!r[h] || r[h].toString().trim() === '') { filled++; return {...r, [h]: 'Unknown'}; } return r; });
      if (filled > 0) log.push(`Filled ${filled} missing values in "${h}" with "Unknown"`);
    });
  }

  if (opts.duplicates) {
    const before = data.length;
    const seen = new Set();
    data = data.filter(r => { const k = JSON.stringify(r); if (seen.has(k)) return false; seen.add(k); return true; });
    const removed = before - data.length;
    if (removed > 0) log.push(`Removed ${removed} duplicate rows`);
    else log.push('No duplicates found');
  }

  if (opts.standardizeCase) {
    const textCols = state.headers.filter(h => !numCols.includes(h));
    data = data.map(r => { const n = {...r}; textCols.forEach(h => { if (n[h]) n[h] = n[h].replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.substr(1).toLowerCase()); }); return n; });
    log.push('Standardized text fields to Title Case');
  }

  if (opts.filterInvalid) {
    const before = data.length;
    data = data.filter(r => numCols.every(h => !r[h] || !isNaN(parseFloat(r[h]))));
    const removed = before - data.length;
    if (removed > 0) log.push(`Removed ${removed} rows with invalid numeric values`);
  }

  if (log.length === 0) log.push('No cleaning actions were necessary');
  state.cleanedData = data;
  state.cleanLog = log;
  showToast(`Cleaning complete — ${log.length} operations applied`);
  renderAll();
}

function downloadClean() {
  const csv = [state.headers.join(','), ...state.cleanedData.map(r => state.headers.map(h => `"${(r[h]||'').toString().replace(/"/g,'""')}"`).join(','))].join('\n');
  const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'cleaned_' + state.fileName; a.click();
}

function showToast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
}

function parseCSV(file) {
  Papa.parse(file, { header: true, skipEmptyLines: true, complete: (res) => {
    state.headers = res.meta.fields;
    state.rawData = res.data;
    state.fileName = file.name;
    state.step = 1;
    renderAll();
  }});
}

function attachEvents() {
  const fi = document.getElementById('fileInput');
  if (fi) fi.addEventListener('change', e => { if (e.target.files[0]) parseCSV(e.target.files[0]); });
  const dz = document.getElementById('dropZone');
  if (dz) {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
    dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); const f = e.dataTransfer.files[0]; if(f) parseCSV(f); });
  }
}
